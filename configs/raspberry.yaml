# Raspberry Pi Optimized Configuration
# Use with: python src/main.py --config configs/raspberry.yaml
# Or with:  python src/main.py --raspberry

# Video source configuration
video:
  # "picamera" for RPi Camera Module, 0 for USB webcam
  source: 0
  # source: "picamera"
  # source: "rtsp://camera-ip:554/stream"

  # Lower resolution for RPi performance
  width: 640
  height: 480
  fps: 15

  # Process every Nth frame (2 = skip every other frame)
  frame_skip: 2

# Detection settings (optimized for ARM)
detection:
  # YOLOv8 nano — smallest and fastest
  model: "yolov8n.pt"

  # Lower confidence to compensate for smaller model
  confidence: 0.4

  # Only detect persons (class 0 in COCO)
  classes: [0]

  # CPU only on Raspberry Pi (no CUDA)
  device: "cpu"

  # Use NCNN export for faster ARM inference
  use_ncnn: true

# Tracking configuration
tracking:
  max_age: 20
  min_hits: 2
  iou_threshold: 0.3

# Dwell-time configuration
dwell:
  min_dwell_time: 5.0
  update_interval: 2.0

# Monitoring zones
zones:
  - name: "entrance"
    description: "Main entrance area"
    points:
      - [0.0, 0.6]
      - [0.3, 0.6]
      - [0.3, 1.0]
      - [0.0, 1.0]

  - name: "display_area"
    description: "Product display zone"
    points:
      - [0.4, 0.3]
      - [0.8, 0.3]
      - [0.8, 0.7]
      - [0.4, 0.7]

# API configuration
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Metrics
metrics:
  enabled: true
  port: 9090
